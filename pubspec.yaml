name: snapmacros
description: "SnapMacros — AI-powered food macro & calorie tracking. Snap a meal, get instant macros."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.2.1
  shared_preferences: ^2.5.0
  equatable: ^2.0.7
  google_fonts: ^6.2.1
  google_mobile_ads: ^5.3.0
  in_app_purchase: ^3.2.0
  image_picker: ^1.1.2
  http: ^1.3.0
  path_provider: ^2.1.5
  path: ^1.9.0
  image: ^4.3.0
  intl: ^0.20.1
  fl_chart: ^0.70.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon_source.png"
  remove_alpha_ios: true
  background_color_ios: "#0F1114"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Regular.ttf
